<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#121212" />
    <title>Page Not Found | DECENT Development</title>
    <meta name="description" content="The requested DECENT Development page could not be found." />
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #121212;
        color: #fffaf2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          linear-gradient(rgba(197, 160, 89, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(197, 160, 89, 0.06) 1px, transparent 1px),
          #121212;
        background-size: 64px 64px;
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 2rem 1.25rem;
      }

      section {
        width: min(760px, 100%);
        border-top: 1px solid rgba(197, 160, 89, 0.55);
        padding-top: 2rem;
      }

      .eyebrow {
        margin: 0;
        color: #c5a059;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 620px;
        margin: 1rem 0 0;
        font-family: Georgia, Cambria, "Times New Roman", serif;
        font-size: clamp(3rem, 10vw, 6.5rem);
        font-weight: 400;
        line-height: 0.95;
      }

      p {
        max-width: 560px;
        margin: 1.5rem 0 0;
        color: #c9c3b8;
        font-size: 1rem;
        line-height: 1.8;
      }

      a {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        margin-top: 2rem;
        border: 1px solid #c5a059;
        padding: 0.85rem 1.25rem;
        color: #fffaf2;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-decoration: none;
        text-transform: uppercase;
      }

      a:hover,
      a:focus-visible {
        background: #c5a059;
        color: #121212;
        outline: none;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <p class="eyebrow">DECENT Development · 404</p>
        <h1>Page not found</h1>
        <p>The page may have moved or the address may be incorrect. Return to the homepage to continue exploring our Sydney construction and property development services.</p>
        <a href="/">Return home</a>
      </section>
    </main>
  </body>
</html>
